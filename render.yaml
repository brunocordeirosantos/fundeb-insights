services:
  - type: web
    name: fundeb-insights-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://snazzy-conkies-2070a4.netlify.app
    autoDeploy: true
